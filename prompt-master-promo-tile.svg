<svg xmlns="http://www.w3.org/2000/svg" width="440" height="280" viewBox="0 0 440 280">
  <defs>
    <!-- Background gradient: 135° from amber to deep violet -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>

    <!-- Radial glow behind icon -->
    <radialGradient id="iconGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="rgba(245,158,11,0.25)"/>
      <stop offset="100%" stop-color="rgba(245,158,11,0)"/>
    </radialGradient>

    <!-- Icon's internal gradient -->
    <linearGradient id="iconG" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
  </defs>

  <!-- Background gradient -->
  <rect width="440" height="280" fill="url(#bgGradient)"/>

  <!-- Subtle dark overlay for depth -->
  <rect width="440" height="280" fill="rgba(0,0,0,0.18)"/>

  <!-- Radial amber glow behind icon (centered at icon center: x=76, y=140) -->
  <circle cx="76" cy="140" r="60" fill="url(#iconGlow)"/>

  <!-- Logo icon at 72x72, x=40, vertically centered (y = (280-72)/2 = 104) -->
  <g transform="translate(40, 104) scale(1.3846)">
    <path d="M 14,23 L 17,13 L 21,20.5 L 26,7 L 31,20.5 L 35,13 L 38,23 Z" fill="url(#iconG)"/>
    <rect x="14" y="21.5" width="24" height="6.5" rx="3.2" fill="url(#iconG)"/>
    <circle cx="17" cy="13" r="2.4" fill="#f59e0b"/>
    <circle cx="26" cy="7" r="2.8" fill="#fbbf24"/>
    <circle cx="35" cy="13" r="2.4" fill="#8b5cf6"/>
    <circle cx="26" cy="7" r="1.2" fill="#ffffff" opacity="0.9"/>
    <rect x="20" y="30" width="12" height="2" rx="1" fill="#ffffff"/>
    <rect x="23" y="30" width="6" height="18" rx="3" fill="#ffffff"/>
    <rect x="20" y="46" width="12" height="2" rx="1" fill="#ffffff"/>
    <circle cx="26" cy="50" r="2" fill="#f59e0b"/>
  </g>

  <!-- Title: "Prompt Master" -->
  <text x="132" y="138"
        font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="28"
        font-weight="700"
        fill="#ffffff">Prompt Master</text>

  <!-- Subtitle: "Score and expand your AI prompts" -->
  <text x="132" y="162"
        font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="13"
        font-weight="400"
        fill="#ffffff"
        fill-opacity="0.6">Score and expand your AI prompts</text>
</svg>
